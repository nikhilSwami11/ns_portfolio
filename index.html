<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <!-- <base href="/"> -->
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Nikhil Swami — Portfolio">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>portfolio</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* ===== Splash Screen Styles ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000000;
      overflow: hidden;
    }

    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    #splash-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .splash-hello {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 1px;
      margin-bottom: 8px;
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.6s ease-out 0.2s forwards;
    }

    .splash-subtitle {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 40px;
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.6s ease-out 0.5s forwards;
    }

    /* Loading bar container */
    .loading-bar-container {
      width: 240px;
      height: 4px;
      background-color: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      overflow: hidden;
      opacity: 0;
      animation: fadeInUp 0.6s ease-out 0.8s forwards;
    }

    /* Loading bar fill */
    .loading-bar-fill {
      width: 0%;
      height: 100%;
      background-color: #ffffff;
      border-radius: 2px;
      animation: loadingProgress 2.5s ease-in-out infinite;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes loadingProgress {
      0% {
        width: 0%;
        margin-left: 0%;
      }

      50% {
        width: 60%;
        margin-left: 20%;
      }

      100% {
        width: 0%;
        margin-left: 100%;
      }
    }
  </style>
</head>

<body>
  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="splash-hello">Hello, welcome to my portfolio</div>
    <div class="splash-subtitle">Loading experience</div>
    <div class="loading-bar-container">
      <div class="loading-bar-fill"></div>
    </div>
  </div>

  <!-- Flutter bootstrap (handles buildConfig automatically in 3.38.x) -->
  <script src="flutter_bootstrap.js" async></script>

  <script>
    var splashStartTime = Date.now();
    var minSplashDuration = 2000; // minimum 2 seconds

    // Remove splash screen with minimum display time
    function removeSplash() {
      var elapsed = Date.now() - splashStartTime;
      var remaining = Math.max(0, minSplashDuration - elapsed);

      setTimeout(function () {
        var splash = document.getElementById('splash-screen');
        if (splash) {
          splash.classList.add('fade-out');
          setTimeout(function () { splash.remove(); }, 500);
        }
      }, remaining);
    }

    // Watch for Flutter's glass pane to appear (signals the app has rendered)
    var observer = new MutationObserver(function (mutations) {
      for (var i = 0; i < mutations.length; i++) {
        for (var j = 0; j < mutations[i].addedNodes.length; j++) {
          var node = mutations[i].addedNodes[j];
          if (node.tagName && (node.tagName.toLowerCase() === 'flt-glass-pane' || node.tagName.toLowerCase() === 'flutter-view')) {
            removeSplash();
            observer.disconnect();
            return;
          }
        }
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });

    // Fallback: remove splash after 10 seconds regardless
    setTimeout(removeSplash, 10000);
  </script>
</body>

</html>
